<!-- Progress Bar Component with Stage Indicators -->
<div class="progress-container" id="progress-container">
    <!-- Stage indicators -->
    <div class="progress-stages" id="progress-stages">
        <div class="progress-stage" data-stage="analyzing">
            <div class="stage-dot"></div>
            <span class="stage-label">Analyzing</span>
        </div>
        <div class="progress-stage" data-stage="classifying">
            <div class="stage-dot"></div>
            <span class="stage-label">Classifying</span>
        </div>
        <div class="progress-stage" data-stage="retrieving">
            <div class="stage-dot"></div>
            <span class="stage-label">Retrieving</span>
        </div>
        <div class="progress-stage" data-stage="generating">
            <div class="stage-dot"></div>
            <span class="stage-label">Generating</span>
        </div>
        <div class="progress-stage" data-stage="complete">
            <div class="stage-dot"></div>
            <span class="stage-label">Complete</span>
        </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar-wrapper">
        <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
    </div>

    <!-- Current step text -->
    <div class="progress-text">
        <span class="progress-step" id="progress-step">Initializing...</span>
        <span class="progress-percent" id="progress-percent">0%</span>
    </div>
</div>

<style>
    .progress-stages {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding: 0 4px;
    }

    .progress-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        position: relative;
    }

    .progress-stage:not(:last-child)::after {
        content: '';
        position: absolute;
        top: 8px;
        left: 50%;
        width: 100%;
        height: 2px;
        background: var(--border-color, #e0e0e0);
        z-index: 0;
    }

    .progress-stage.completed:not(:last-child)::after {
        background: var(--abbvie-purple, #71368a);
    }

    .stage-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--border-color, #e0e0e0);
        border: 2px solid var(--border-color, #e0e0e0);
        z-index: 1;
        transition: all 0.3s ease;
    }

    .progress-stage.active .stage-dot {
        background: white;
        border-color: var(--abbvie-purple, #71368a);
        box-shadow: 0 0 0 3px rgba(113, 54, 138, 0.2);
        animation: pulse 1.5s infinite;
    }

    .progress-stage.completed .stage-dot {
        background: var(--abbvie-purple, #71368a);
        border-color: var(--abbvie-purple, #71368a);
    }

    .progress-stage.completed .stage-dot::after {
        content: '\2713';
        color: white;
        font-size: 10px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
    }

    .stage-label {
        font-size: 11px;
        color: var(--text-muted, #6c757d);
        margin-top: 6px;
        text-align: center;
        transition: color 0.3s ease;
    }

    .progress-stage.active .stage-label {
        color: var(--abbvie-purple, #71368a);
        font-weight: 600;
    }

    .progress-stage.completed .stage-label {
        color: var(--abbvie-purple, #71368a);
    }

    @keyframes pulse {
        0% {
            box-shadow: 0 0 0 0 rgba(113, 54, 138, 0.4);
        }
        70% {
            box-shadow: 0 0 0 6px rgba(113, 54, 138, 0);
        }
        100% {
            box-shadow: 0 0 0 0 rgba(113, 54, 138, 0);
        }
    }

    .progress-bar-wrapper {
        margin-top: 8px;
    }
</style>

<script>
    // Stage order for tracking completion
    const STAGE_ORDER = ['analyzing', 'classifying', 'retrieving', 'generating', 'complete'];
    let currentStageIndex = -1;

    function updateProgress(percent, stageName) {
        const progressBar = document.getElementById('progress-bar');
        const progressStep = document.getElementById('progress-step');
        const progressPercent = document.getElementById('progress-percent');

        // Update progress bar
        progressBar.style.width = percent + '%';
        progressStep.textContent = stageName;
        progressPercent.textContent = percent + '%';

        // Update stage indicators
        updateStageIndicators(stageName.toLowerCase());
    }

    function updateStageIndicators(currentStage) {
        const stages = document.querySelectorAll('.progress-stage');
        const stageIndex = STAGE_ORDER.indexOf(currentStage);

        if (stageIndex === -1) return;

        currentStageIndex = stageIndex;

        stages.forEach((stage, index) => {
            const stageName = stage.dataset.stage;
            const stagePosition = STAGE_ORDER.indexOf(stageName);

            // Remove all state classes
            stage.classList.remove('active', 'completed');

            if (stagePosition < stageIndex) {
                // Previous stages are completed
                stage.classList.add('completed');
            } else if (stagePosition === stageIndex) {
                // Current stage is active
                stage.classList.add('active');
            }
            // Future stages remain in default state
        });

        // Special case: if complete, mark it as completed too
        if (currentStage === 'complete') {
            const completeStage = document.querySelector('[data-stage="complete"]');
            if (completeStage) {
                completeStage.classList.remove('active');
                completeStage.classList.add('completed');
            }
        }
    }

    function resetStageIndicators() {
        const stages = document.querySelectorAll('.progress-stage');
        stages.forEach(stage => {
            stage.classList.remove('active', 'completed');
        });
        currentStageIndex = -1;
    }

    function hideProgress() {
        const progressContainer = document.getElementById('progress-container');
        progressContainer.style.display = 'none';
    }

    function showProgress() {
        const progressContainer = document.getElementById('progress-container');
        progressContainer.style.display = 'block';
        resetStageIndicators();
    }
</script>
